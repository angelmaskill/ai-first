# Deterministic Routing Manifest
# Maps user intent categories to agents. LLM classifies intent → lookup table dispatches.
# This is the authoritative routing source. Agent descriptions in .claude/agents/*.md
# are for agent internal context only — NOT for dispatch decisions.

version: "1.0"
last_updated: 2026-04-26

# Auto-dispatch configuration.
# High confidence (>= auto_dispatch_threshold): auto-dispatch, no confirmation.
# Low confidence but not ambiguous: auto-dispatch with best match.
# Ambiguous (confidence gap < ambiguity_threshold): ask user to choose.
auto_dispatch_threshold: 0.85
ambiguity_threshold: 0.5

# Stage auto-advance configuration.
# When all exit checklist items are satisfied, automatically advance to next stage.
stage_auto_advance:
  enabled: true
  require_all_tasks_done: true
  require_all_syncs_confirmed: true
  require_all_gates_passed: true
  notify_user: true

routes:
  planning:
    keywords:
      - plan
      - design
      - scope
      - spec
      - requirement
      - architecture
      - milestone
      - roadmap
      - decide
      - decision
    description: "Planning, design, and requirements work"
    primary_agent: planner-agent
    fallback_agent: architect-agent
    confirmation: auto
    stage_gate: [discovery, spec, architecture, build, qa, evolve]

  implementing:
    keywords:
      - implement
      - build
      - code
      - fix
      - refactor
      - scaffold
      - create
      - add
      - write
      - change
      - update
      - modify
      - remove
      - delete
    description: "Code implementation and changes"
    primary_agent: builder-agent
    confirmation: auto  # no confirmation needed, auto-dispatch
    complexity:
      threshold: 0.6
      action: "split_via_dispatcher"
      tool: "npx tsx src/core/harness/subagent-dispatcher.ts"
    stage_gate: [scaffold, build]
    fast_path:  # bypass stage_gate when sub-intent matches
      hotfix:
        keywords: [fix, bug, hotfix, error, crash, patch, 紧急, 故障, 挂了, 报错, 修复]
        behavior: warn_any_stage  # allow from any stage with warning
        message: "紧急修复模式。当前在 {stage} 阶段，允许执行修复。"
      iteration:
        keywords: [add, feature, 功能, 需求, 迭代, enhancement]
        allowed_stages: [operate, evolve, qa]
        behavior: auto_mini_cycle  # temporary build cycle, return to original stage after
      refactor:
        keywords: [refactor, 重构, cleanup, clean, tech-debt, 技术债]
        allowed_stages: [operate, evolve]
        behavior: warn  # warn but allow
    auto_chain:
      - parallel:
          - skill: bug-scan
          - skill: security-scan
        fail_fast: true
        max_retries: 3
      - agent: knowledge-sync-agent
      - parallel:
          - agent: reviewer-agent
          - agent: security-reviewer-agent
        max_retries: 3
      - agent: state-updater-agent

  reviewing:
    keywords:
      - review
      - quality
      - gate
      - check
      - verify
      - validate
      - inspect
    description: "Code and quality review"
    primary_agent: reviewer-agent
    confirmation: auto
    parallel_agents:
      - security-reviewer-agent
    stage_gate: [build, qa, release, operate]

  scanning:
    keywords:
      - scan
      - analyze
      - assess
      - audit
      - inspect
      - detect
    description: "Project scanning and analysis"
    primary_agent: repo-scanner-agent
    confirmation: auto
    post_actions:
      - stage-assessor-agent
      - team-lead-agent
    stage_gate: [all]

  security:
    keywords:
      - security
      - vulnerability
      - secret
      - auth
      - permission
      - threat
      - exploit
      - credential
      - token
      - OWASP
    description: "Security analysis and review"
    primary_agent: security-reviewer-agent
    confirmation: auto
    stage_gate: [build, qa, release, operate]

  knowledge-sync:
    keywords:
      - sync
      - knowledge
      - wiki
      - docs
      - document
      - stale
      - rot
    description: "Knowledge synchronization and documentation"
    primary_agent: knowledge-sync-agent
    confirmation: auto
    stage_gate: [all]

  state-mutation:
    keywords:
      - advance
      - transition
      - stage
      - state
      - update-status
      - timeline
      - lock
      - unlock
    description: "Project state changes"
    primary_agent: state-updater-agent
    confirmation: required_for_direct  # user-initiated state changes need confirmation
    internal: auto  # system-initiated (auto_chain, auto_advance) skip confirmation
    exclusive: true  # Only this agent can mutate state
    stage_gate: [all]

  testing:
    keywords:
      - test
      - testing
      - coverage
      - unit test
      - generate test
      - test case
      - mock
    description: "Test generation and coverage improvement"
    primary_agent: smoke-case-agent
    confirmation: auto
    post_skills: [test-generator]
    stage_gate: [build, qa]

  smoke-testing:
    keywords:
      - smoke
      - critical path
      - deployment check
      - release gate
      - core test
      - essential test
    description: "Smoke test case organization and critical path testing"
    primary_agent: smoke-case-agent
    confirmation: auto
    stage_gate: [release, operate]

  guidance:
    keywords:
      - guide
      - health
      - status
      - dashboard
      - recommend
      - suggest
      - next
    description: "Health checks and guidance"
    primary_agent: team-lead-agent
    confirmation: auto
    stage_gate: [all]

  release:
    keywords:
      - release
      - deploy
      - ship
      - publish
      - version
      - changelog
    description: "Release preparation and execution"
    primary_agent: release-agent
    confirmation: auto
    stage_gate: [release]

# Slash commands bypass routing — these are deterministic by definition
slash_commands:
  /init:       { agent: intake-agent, stage: idea }
  /adopt:      { agent: repo-scanner-agent, stage: build, chain: [stage-assessor-agent, knowledge-sync-agent, skill-recommend-agent] }
  /guide:      { agent: team-lead-agent }
  /scan:       { agent: repo-scanner-agent, chain: [stage-assessor-agent] }
  /decide:     { agent: planner-agent, output: "knowledge/KNOW-XXX.md" }
  /review:     { agent: reviewer-agent, parallel: [security-reviewer-agent] }
  /sync:       { agent: knowledge-sync-agent }
  /advance:    { agent: state-updater-agent }
  /complete:   { agent: builder-agent, chain: [knowledge-sync-agent, reviewer-agent, security-reviewer-agent, state-updater-agent] }
  /task:       { agent: planner-agent, output: "tasks/task-{date}-{id}.yml" }
  /wiki:       { agent: knowledge-sync-agent }
  /skills:     { agent: skill-recommend-agent }
  /health:     { agent: team-lead-agent }
  /standards:  { agent: team-lead-agent }
  /smoke:      { agent: smoke-case-agent, output: "reports/smoke-cases-{date}.md" }
  /test-gen:   { agent: smoke-case-agent, skill: test-generator, output: "reports/test-generation-{date}.md" }
